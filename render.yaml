services:
  - type: web
    name: lingoplay
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 4 --timeout 60
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: SECRET_KEY
        generateValue: true
      - key: COOKIE_SECURE
        value: "1"
      - key: DATABASE_URL
        fromDatabase:
          name: lingoplay-db
          property: connectionString
      - key: ADMIN_EMAIL
        value: admin@lingoplay.local

      - key: ADMIN_PASSWORD
        sync: false
databases:
  - name: lingoplay-db
    databaseName: lingoplay
    user: lingoplay
